version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - pnpm install --no-frozen-lockfile && pnpm run build:lib
        - cd app && pnpm install --no-frozen-lockfile
    build:
      commands:
        - NITRO_PRESET=aws-amplify pnpm run build
  artifacts:
    baseDirectory: app/.amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - app/node_modules/**/*
